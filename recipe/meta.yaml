{% set name = "scientific-pydantic" %}
{% set version = "0.4.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/scientific_pydantic-{{ version }}.tar.gz
  sha256: c627d87021f813cf6d30a10d2f389589a71f6c7572a285cfc2f5bd9fe60c52ea

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - uv-build >=0.8.3,<0.9.0
    - pip
  run:
    - python >={{ python_min }}
    - pydantic >=2.0

test:
  imports:
    - scientific_pydantic
  commands:
    - pip check
  requires:
    - python {{ python_min }}
    - pip

about:
  home: https://pypi.org/project/scientific-pydantic/
  summary: Pydantic adapters for common scientific types
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - psalvaggio
